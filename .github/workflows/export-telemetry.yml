# GitHub Actions Workflow: Export Telemetry Stats Daily
# Place this in: .github/workflows/export-telemetry.yml

name: Export Telemetry Stats

on:
  # Run every day at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          name: Export Telemetry Stats

          on:
            schedule:
              - cron: '0 2 * * *'
            workflow_dispatch:

          permissions:
            contents: write

          jobs:
            export:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Validate repo and secrets
                  env:
                    EXPECTED_REPO: ivanoliv/SPOVersionManagement
                    BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
                    TELEMETRY_API_KEY: ${{ secrets.TELEMETRY_API_KEY }}
                  run: |
                    if [ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPO}" ]; then
                      echo "Repository mismatch. Expected ${EXPECTED_REPO}, got ${GITHUB_REPOSITORY}."
                      exit 1
                    fi
                    if [ -z "${BACKEND_API_URL}" ]; then
                      echo "Missing secret BACKEND_API_URL"
                      exit 1
                    fi
                    if [ -z "${TELEMETRY_API_KEY}" ]; then
                      echo "Missing secret TELEMETRY_API_KEY"
                      exit 1
                    fi

                - name: Fetch telemetry data from backend
                  env:
                    BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
                    TELEMETRY_API_KEY: ${{ secrets.TELEMETRY_API_KEY }}
                  run: |
                    HTTP_CODE=$(curl -sS -w "%{http_code}" \
                      "${BACKEND_API_URL}" \
                      -H "X-API-Key: ${TELEMETRY_API_KEY}" \
                      -H "Accept: application/json" \
                      -o telemetry-stats.json)

                    echo "HTTP code: ${HTTP_CODE}"

                    if [ "${HTTP_CODE}" != "200" ]; then
                      echo "Backend call failed"
                      cat telemetry-stats.json || true
                      exit 1
                    fi

                    if ! jq empty telemetry-stats.json >/dev/null 2>&1; then
                      echo "Invalid JSON payload"
                      cat telemetry-stats.json || true
                      exit 1
                    fi

                - name: Update timestamp marker
                  run: |
                    echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > .telemetry-updated

                - name: Commit and push changes
                  run: |
                    git config user.email "action@github.com"
                    git config user.name "Telemetry Bot"
                    git add telemetry-stats.json .telemetry-updated
                    if git diff --cached --quiet; then
                      echo "No changes to commit"
                      exit 0
                    fi
                    git commit -m "Auto: Update telemetry stats [skip ci]"
                    git push
          if [ "$HTTP_CODE" = "401" ]; then
