name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore src\SPOVersionManagement.sln

    - name: Build Release
      run: dotnet build src\SPOVersionManagement.sln -c Release --no-restore

    - name: Read version from AppPaths.json
      id: version
      shell: pwsh
      run: |
        $ver = Get-Content "config\version.json" | ConvertFrom-Json
        $version = $ver.AppVersion
        echo "APP_VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Create deployment package
      shell: pwsh
      run: |
        .\Build-DeployPackage.ps1
        $zip = Get-ChildItem "deploy\*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        echo "PACKAGE_PATH=$($zip.FullName)" >> $env:GITHUB_OUTPUT
        echo "PACKAGE_NAME=$($zip.Name)" >> $env:GITHUB_OUTPUT
      id: package

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: SPOVersionManagement_v${{ steps.version.outputs.APP_VERSION }}
        path: ${{ steps.package.outputs.PACKAGE_PATH }}
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "v${{ steps.version.outputs.APP_VERSION }}"
        body: |
          ## SPO Version Management v${{ steps.version.outputs.APP_VERSION }}
          
          ### Installation
          1. Download the ZIP below
          2. Extract to your desired folder
          3. Run `Install-SPOVersionManagement.ps1` (preserves existing configs)
          
          ### What's included
          - PowerShell modules and scripts
          - Windows GUI application (compiled)
          - HTML Dashboard
          - Configuration templates
          
          ---
          
          > ⚠️ This tool is not affiliated with or supported by Microsoft Corporation. Use at your own risk.
        files: |
          ${{ steps.package.outputs.PACKAGE_PATH }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
